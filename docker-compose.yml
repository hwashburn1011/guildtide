# ---------------------------------------------------------------------------
# Docker Compose — Guildtide Local Dev (T-1901, T-1904)
# ---------------------------------------------------------------------------
version: '3.9'

services:
  # ---- Server --------------------------------------------------------------
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: file:./data/guildtide.db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    volumes:
      - server-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- Client (dev only) ---------------------------------------------------
  client:
    image: node:20-alpine
    working_dir: /app
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://server:4000
    volumes:
      - ./client:/app
      - client-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      server:
        condition: service_healthy

volumes:
  server-data:
  client-node-modules:
